<div class="auth-container">
    <h2>Login</h2>
  
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" />
        @if (loginForm.controls.username.touched && loginForm.controls.username.invalid) {
          <small class="error-text">Username is required.</small>
        }
      </div>
  
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" />
        @if (loginForm.controls.password.touched && loginForm.controls.password.invalid) {
          <small class="error-text">Password is required.</small>
        }
      </div>
  
      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }
  
      <button type="submit" [disabled]="authService.loading$ | async">Login</button>
    </form>
  </div>
